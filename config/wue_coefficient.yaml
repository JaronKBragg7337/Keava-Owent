# Water Usage Effectiveness coefficient: liters of water per kWh of energy.
# Used to turn the (real, measured) energy draw into a water ESTIMATE.
#
# This number is directional, not authoritative — a personal machine is not a
# data center, and published figures vary by an order of magnitude:
#   - 1.8  L/kWh : industry on-site average (LBNL / Shehabi et al. 2016)
#   - 0.15 L/kWh : AWS hyperscaler on-site (2024)
#   - 0.30 L/kWh : Microsoft hyperscaler on-site (FY24)
#   - 7.6  L/kWh : average power-generation (source-energy) water (LBNL 2016)
#
# We default to the honest industry on-site average and LABEL it, in keeping
# with "do not claim a zero you never measured" — and equally, do not claim a
# false precision you never measured.
liters_per_kwh: 1.8
basis: "industry_onsite_average_LBNL_Shehabi_2016"
